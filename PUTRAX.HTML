<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUTRAX SXR</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #fff;
}

.container {
    text-align: center;
    animation: fadeIn 1.2s ease;
}

.title {
    font-size: 32px;
    letter-spacing: 3px;
    margin-bottom: 10px;
    color: #e2e8f0;
}

.subtitle {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 40px;
}

.btn {
    position: relative;
    padding: 16px 40px;
    border: none;
    border-radius: 50px;
    font-size: 14px;
    letter-spacing: 1px;
    color: #fff;
    background: linear-gradient(135deg, #2563eb, #1e3a8a);
    cursor: pointer;
    transition: 0.3s ease;
    overflow: hidden;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
}

.btn:active {
    transform: scale(0.97);
}

.btn::before {
    content: "";
    position: absolute;
    width: 300%;
    height: 300%;
    background: rgba(255,255,255,0.05);
    top: -100%;
    left: -100%;
    transform: rotate(25deg);
    transition: 0.6s;
}

.btn:hover::before {
    top: 0;
    left: 0;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="title">PUTRAX SXR</div>
    <div class="subtitle">Official Channel</div>

    <button class="btn" onclick="openChannel()">
        SALURAN PUTRAX SXR
    </button>
</div>

<script>
function openChannel() {
    window.open("https://whatsapp.com/channel/0029Vb7rQnp2phHI5t77d31v", "_blank");
}
</script>

</body>
</html>
